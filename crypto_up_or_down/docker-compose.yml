x-bot-common: &bot-common
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  env_file:
    - .env                                 # SCP'd to VPS manually, never committed to git
  volumes:
    - /opt/polymarket/state:/app/state     # trades.json, bot.log, history files
    - /opt/polymarket/data:/app/data       # Binance OHLCV parquet files
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "5"

services:

  # ------------------------------------------------------------------ #
  # Paper research bots — honest FOK simulation, no real money         #
  # Active bots (2026-03-24):                                          #
  #   reversal-trend-bot          — streak_reversal/eth/5m + TrendFilter(50) + min-fill=0.54 #
  #   adx-eth-5m-bot              — streak_adx/eth/5m + SessionFilter(good hours) + min-fill=0.53 #
  #   hl-orderflow-momo-5m-bot    — hl_orderflow_momentum/btc/5m            #
  #   hl-orderflow-momo-15m-bot   — hl_orderflow_momentum/btc/15m           #
  #   hl-orderflow-reversal-5m-bot — hl_orderflow_reversal/btc/5m + block 03-08h #
  #   3barmomo-hl-5m-bot          — 3bar_momo/btc/5m + HL gate + block 16,17,20h #
  #   3barmomo-5m-scale-bot       — 3bar_momo/btc/5m + HL pressure sizing  #
  #   pinbar-hl-5m-bot            — pin_bar_reversal/btc/5m + HL gate      #
  #   delta-flip-btc-5m-bot       — delta_flip/btc/5m + 1h gate + vol-confirm (re-enabled) #
  # ------------------------------------------------------------------ #

  # Config 0: streak_reversal/eth/5m — no gate, pure baseline
  # Re-launched 2026-03-10 fresh (oracle-signal fix applied)
  streak-bot:
    <<: *bot-common
    container_name: polymarket-streak-bot
    command: ["uv", "run", "python", "scripts/bots/streak_bot.py", "--paper", "--asset", "eth"]
    environment:
      PAPER_TRADE: "true"
      ASSET: "eth"
      TRADES_FILE: "/app/state/trades.json"
      HISTORY_FILE: "/app/state/trade_history_full.json"
      LOG_FILE: "/app/state/bot.log"

  # Config 1: streak_reversal/eth/5m + TrendFilter(ema=50, veto_with_trend)
  # Walk-forward (2024-2026): test Sharpe 6.60 (close+spread), 6.07 (intrabar_conservative)
  # ema=50 > ema=100 (6.60 vs 6.23); trigger=4; half_spread=0.005 baked into scoring
  # 2026-03-24: added min-fill=0.54 gate (fills <0.55 → 50.7% WR; ≥0.55 → 64.0% WR)
  # RETIRED 2026-03-30: reversal-trend-bot — streak_reversal/eth/5m + TrendFilter(50).
  # Negative live edge; session-gated adx variant supersedes this.
