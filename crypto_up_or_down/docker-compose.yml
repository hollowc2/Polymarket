  #     ASSET: "eth"
  #     TIMEFRAME: "15m"
  #     STRATEGY: "streak_adx"
  #     TRADES_FILE: "/app/state/adx-eth-15m-trades.json"
  #     HISTORY_FILE: "/app/state/adx-eth-15m-history.json"
  #     LOG_FILE: "/app/state/adx-eth-15m-bot.log"

  # hl_orderflow_momo/btc/5m — cross-asset momentum from Hyperliquid perp order flow
  # HTF gate (4h) + 2-of-3 entry vote (5m/15m/1h) + pressure-scaled sizing
  # Live-only strategy: evaluate() fetches current HL data; no historical backtesting.
  hl-orderflow-momo-5m-bot:
    <<: *bot-common
    container_name: polymarket-hl-orderflow-momo-5m-bot
    command:
      - "uv"
      - "run"
      - "python"
      - "scripts/bots/hl_orderflow_bot.py"
      - "--paper"
      - "--asset"
      - "btc"
      - "--timeframe"
      - "5m"
      - "--size"
      - "15.0"
      - "--max-size"
      - "30.0"
      - "--min-votes"
      - "2"
    environment:
      PAPER_TRADE: "true"
      ASSET: "btc"
      TIMEFRAME: "5m"
      TRADES_FILE: "/app/state/hl-orderflow-momo-5m-trades.json"
      HISTORY_FILE: "/app/state/hl-orderflow-momo-5m-history.json"
      LOG_FILE: "/app/state/hl-orderflow-momo-5m-bot.log"

  # hl_orderflow_momo/btc/15m — same signal, lower-frequency entries
  hl-orderflow-momo-15m-bot:
    <<: *bot-common
    container_name: polymarket-hl-orderflow-momo-15m-bot
    command:
      - "uv"
      - "run"
      - "python"
      - "scripts/bots/hl_orderflow_bot.py"
      - "--paper"
      - "--asset"
      - "btc"
      - "--timeframe"
      - "15m"
      - "--size"
      - "15.0"
      - "--max-size"
      - "30.0"
      - "--min-votes"
      - "2"
    environment:
      PAPER_TRADE: "true"
      ASSET: "btc"
      TIMEFRAME: "15m"
      TRADES_FILE: "/app/state/hl-orderflow-momo-15m-trades.json"
      HISTORY_FILE: "/app/state/hl-orderflow-momo-15m-history.json"
      LOG_FILE: "/app/state/hl-orderflow-momo-15m-bot.log"

  # hl_orderflow_reversal/btc/5m — fade exhausted Hyperliquid perp flow (contrarian)
  # Inverted HTF gate + 3-of-3 entry vote + pressure-scaled sizing
  hl-orderflow-reversal-5m-bot:
    <<: *bot-common
    container_name: polymarket-hl-orderflow-reversal-5m-bot
    command:
      - "uv"
      - "run"
      - "python"
      - "scripts/bots/hl_orderflow_bot.py"
      - "--paper"
      - "--asset"
      - "btc"
      - "--timeframe"
      - "5m"
      - "--strategy"
      - "reversal"
      - "--size"
      - "15.0"
      - "--max-size"
      - "30.0"
      - "--min-votes"
      - "3"
    environment:
      PAPER_TRADE: "true"
      ASSET: "btc"
      TIMEFRAME: "5m"
      TRADES_FILE: "/app/state/hl-orderflow-reversal-5m-trades.json"
      HISTORY_FILE: "/app/state/hl-orderflow-reversal-5m-history.json"
      LOG_FILE: "/app/state/hl-orderflow-reversal-5m-bot.log"

  # 3barmomo/btc/5m + HL gate — momentum bot gated by Hyperliquid 5m+15m flow
  # Only enters when HL perp flow does NOT strongly oppose the candle momentum
  3barmomo-hl-5m-bot:
    <<: *bot-common
    container_name: polymarket-3barmomo-hl-5m-bot
    command:
      - "uv"
      - "run"
      - "python"
      - "scripts/bots/3barmomo_bot.py"
      - "--paper"
      - "--bars"
      - "3"
      - "--hl-gate"
      - "--hl-coin"
      - "BTC"
    environment:
      PAPER_TRADE: "true"
      TRADES_FILE: "/app/state/3barmomo-hl-5m-trades.json"
      HISTORY_FILE: "/app/state/3barmomo-hl-5m-history.json"
      LOG_FILE: "/app/state/3barmomo-hl-5m-bot.log"

  # 3barmomo/btc/5m + HL pressure sizing — same signal as 3barmomo-hl-5m,
  # position size scales with HL buy/sell pressure (base×pressure×2, capped at max_size)
  3barmomo-5m-scale-bot:
    <<: *bot-common
    container_name: polymarket-3barmomo-5m-scale-bot
    command:
      - "uv"
      - "run"
      - "python"
      - "scripts/bots/3barmomo_scale_bot.py"
      - "--paper"
      - "--bars"
      - "3"
      - "--hl-gate"
      - "--hl-coin"
      - "BTC"
      - "--size"
      - "15.0"
      - "--max-size"
      - "30.0"
    environment:
      PAPER_TRADE: "true"
      TRADES_FILE: "/app/state/3barmomo-5m-scale-trades.json"
      HISTORY_FILE: "/app/state/3barmomo-5m-scale-history.json"
      LOG_FILE: "/app/state/3barmomo-5m-scale-bot.log"

  # pinbar/btc/5m + HL gate — pin bar reversal gated by HL 5m flow
  # Skips reversals when HL 5m perp flow strongly opposes the expected move
  pinbar-hl-5m-bot:
    <<: *bot-common
    container_name: polymarket-pinbar-hl-5m-bot
    command:
      - "uv"
      - "run"
      - "python"
      - "scripts/bots/pinbar_bot.py"
      - "--paper"
      - "--hl-gate"
      - "--hl-coin"
      - "BTC"
    environment:
      PAPER_TRADE: "true"
      TRADES_FILE: "/app/state/pinbar-hl-5m-trades.json"
      HISTORY_FILE: "/app/state/pinbar-hl-5m-history.json"
      LOG_FILE: "/app/state/pinbar-hl-5m-bot.log"

  # RETIRED 2026-03-19: delta_flip/btc/5m — unacceptable max drawdown.
  # delta-flip-btc-5m-bot:
