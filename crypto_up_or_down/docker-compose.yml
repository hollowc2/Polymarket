  #     HISTORY_FILE: "/app/state/my-bot-history.json"
  #     LOG_FILE: "/app/state/my-bot.log"

  # ------------------------------------------------------------------ #
  # Monitoring stack                                                    #
  # ------------------------------------------------------------------ #

  # Reads state JSON files and exposes /api/leaderboard + /api/trades
  # consumed by Grafana Infinity datasource.
  metrics-server:
    <<: *bot-common
    container_name: polymarket-metrics-server
    command:
      - "uv"
      - "run"
      - "python"
      - "scripts/monitor/metrics_server.py"
      - "--state-dir"
      - "/app/state"
      - "--port"
      - "9099"
    environment: {}
    ports:
      - "9099:9099"

  # Grafana is already running on this host (port 3000).
  # Add the Infinity datasource + import monitoring/grafana/provisioning/dashboards/polymarket.json
  # manually, or mount the provisioning dir into your existing Grafana container.
  # grafana:
  #   image: grafana/grafana:11.5.2
