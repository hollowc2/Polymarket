  # --- Grafana Prometheus exporter (monitoring) ---
  grafana-exporter:
    image: python:3.12-slim
    container_name: polymarket-grafana-exporter
    command: >
      sh -c "pip install prometheus_client -q &&
             python /app/scripts/grafana_exporter.py"
    volumes:
      - /opt/polymarket/state:/opt/polymarket/state:ro
      - .:/app
    ports:
      - "127.0.0.1:8002:8002"
    networks:
      - monitoring_net
    restart: unless-stopped

