  #     TRADES_FILE: "/app/state/apex-hybrid-trades.json"
  #     HISTORY_FILE: "/app/state/apex-hybrid-history.json"
  #     LOG_FILE: "/app/state/apex-hybrid-bot.log"

  # Config 2: streak_adx/eth/5m + TrendFilter(ema=50, veto_with_trend)
  # Sweep (2026-03-10): test Sharpe 6.48, win 55.7%, 16.4k test trades
  # Best params: trigger=4, adx_period=20, adx_threshold=30, ema=50
  # Selected by TRAIN Sharpe (8.06) — no test leakage
  adx-eth-5m-bot:
    <<: *bot-common
    container_name: polymarket-adx-eth-5m-bot
    command:
      - "uv"
      - "run"
      - "python"
      - "scripts/bots/streak_bot.py"
      - "--paper"
      - "--asset"
      - "eth"
      - "--timeframe"
      - "5m"
      - "--trigger"
      - "4"
      - "--strategy"
      - "streak_adx"
      - "--gate"
      - "trend_filter"
      - "--ema-period"
      - "50"
      - "--adx-period"
      - "20"
      - "--adx-threshold"
      - "30"
    environment:
      PAPER_TRADE: "true"
      ASSET: "eth"
      TIMEFRAME: "5m"
      STRATEGY: "streak_adx"
      TRADES_FILE: "/app/state/adx-eth-5m-trades.json"
      HISTORY_FILE: "/app/state/adx-eth-5m-history.json"
      LOG_FILE: "/app/state/adx-eth-5m-bot.log"

  # RETIRED 2026-03-13: streak_adx/eth/15m — 46 live trades at -5.3% edge, Sharpe -0.91, sub-break-even.
  # 15m timeframe produced negative live edge vs +5.8% on 5m. High variance, fewer trades, consistent losses.
  # adx-eth-15m-bot:
  #   <<: *bot-common
  #   container_name: polymarket-adx-eth-15m-bot
  #   command:
  #     - "uv"
  #     - "run"
  #     - "python"
  #     - "scripts/bots/streak_bot.py"
  #     - "--paper"
  #     - "--asset"
  #     - "eth"
  #     - "--timeframe"
  #     - "15m"
  #     - "--trigger"
  #     - "3"
  #     - "--strategy"
  #     - "streak_adx"
  #     - "--gate"
