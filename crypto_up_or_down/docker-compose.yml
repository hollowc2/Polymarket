      TRADES_FILE: "/app/state/3barmomo-5m-scale-trades.json"
      HISTORY_FILE: "/app/state/3barmomo-5m-scale-history.json"
      LOG_FILE: "/app/state/3barmomo-5m-scale-bot.log"

  # pinbar/btc/5m + HL gate — pin bar reversal gated by HL 5m flow
  # Skips reversals when HL 5m perp flow strongly opposes the expected move
  pinbar-hl-5m-bot:
    <<: *bot-common
    container_name: polymarket-pinbar-hl-5m-bot
    command:
      - "uv"
      - "run"
      - "python"
      - "scripts/bots/pinbar_bot.py"
      - "--paper"
      - "--hl-gate"
      - "--hl-coin"
      - "BTC"
    environment:
      PAPER_TRADE: "true"
      TRADES_FILE: "/app/state/pinbar-hl-5m-trades.json"
      HISTORY_FILE: "/app/state/pinbar-hl-5m-history.json"
      LOG_FILE: "/app/state/pinbar-hl-5m-bot.log"

  # delta_flip/btc/5m — zero-crossing on HL cumulative delta
  # RETIRED 2026-03-19: unacceptable max drawdown (built $207 then gave it all back).
  # RE-ENABLED 2026-03-24 with targeted fixes:
  #   - HTF gate: 4h → 1h (faster regime detection, less signal lag)
  #   - Block 00h-01h UTC (30-45% WR midnight noise)
  #   - Vol confirm: only fire when current bar volume ≥ rolling 20-bar median
  delta-flip-btc-5m-bot:
    <<: *bot-common
    container_name: polymarket-delta-flip-btc-5m-bot
    command:
      - "uv"
      - "run"
      - "python"
      - "scripts/bots/delta_flip_bot.py"
      - "--paper"
      - "--asset"
      - "btc"
      - "--timeframe"
      - "5m"
      - "--gate-timeframe"
      - "1h"
      - "--size"
      - "15.0"
      - "--max-size"
      - "30.0"
      - "--block-hours"
      - "0,1"
      - "--vol-confirm"
    environment:
      PAPER_TRADE: "true"
      ASSET: "btc"
      TIMEFRAME: "5m"
      TRADES_FILE: "/app/state/delta-flip-btc-5m-trades.json"
      HISTORY_FILE: "/app/state/delta-flip-btc-5m-history.json"
      LOG_FILE: "/app/state/delta-flip-btc-5m-bot.log"

