  # Config 2: streak_adx/eth/5m + SessionFilter (productive hours only) + min-fill gate
  # Sweep (2026-03-10): test Sharpe 6.48, win 55.7%, 16.4k test trades
  # Best params: trigger=4, adx_period=20, adx_threshold=30
  # 2026-03-24: switched gate trend_filter→session (live Sharpe 0.09 → ~0.6 projected)
  #   Allowed hours: 02-03, 07, 09-10, 17, 19 UTC (all ≥60% WR in live data)
  #   Added min-fill=0.53 (0.55-0.60 fills → 60% WR vs 0.50-0.55 → 52.2% WR)
  adx-eth-5m-bot:
    <<: *bot-common
    container_name: polymarket-adx-eth-5m-bot
    command:
      - "uv"
      - "run"
      - "python"
      - "scripts/bots/streak_bot.py"
      - "--paper"
      - "--asset"
      - "eth"
      - "--timeframe"
      - "5m"
      - "--trigger"
      - "4"
      - "--strategy"
      - "streak_adx"
      - "--gate"
      - "session"
      - "--session-hours"
      - "2-3,7,9-10,17,19"
      - "--adx-period"
      - "20"
      - "--adx-threshold"
      - "30"
      - "--min-fill"
      - "0.53"
    environment:
      PAPER_TRADE: "true"
      ASSET: "eth"
      TIMEFRAME: "5m"
      STRATEGY: "streak_adx"
      TRADES_FILE: "/app/state/adx-eth-5m-trades.json"
      HISTORY_FILE: "/app/state/adx-eth-5m-history.json"
      LOG_FILE: "/app/state/adx-eth-5m-bot.log"

  # RETIRED 2026-03-13: streak_adx/eth/15m — 46 live trades at -5.3% edge, Sharpe -0.91, sub-break-even.
  # 15m timeframe produced negative live edge vs +5.8% on 5m. High variance, fewer trades, consistent losses.
